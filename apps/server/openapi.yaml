openapi: 3.1.0
info:
  title: Attra Concierge API
  description: >
    API do Attra Concierge — consultor premium de veículos da Attra Veículos.
    Permite buscar veículos reais do estoque, ver detalhes, comparar opções,
    iniciar contato com consultores e visualizar caminhos de compra.
  version: 0.1.0

servers:
  - url: https://concierge.attraveiculos.com.br
    description: Servidor de produção

security:
  - OAuth2PKCE: []

paths:
  /tools/search_inventory:
    post:
      operationId: searchInventory
      x-openai-isConsequential: false
      summary: Busca veículos no estoque da Attra
      description: >
        Busca veículos do estoque real da Attra por intenção textual e/ou filtros
        (marca, carroceria, combustível, preço, ano, blindagem, perfis).
        Use sempre que o usuário explorar opções ou refinar critérios.
        Nunca invente disponibilidade: use só o estoque retornado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchInventoryInput"
      responses:
        "200":
          description: Lista de veículos encontrados com highlights e motivo do match.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse_SearchInventory"
        "400":
          description: Erro de validação nos parâmetros enviados.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno do servidor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/get_vehicle_details:
    post:
      operationId: getVehicleDetails
      x-openai-isConsequential: false
      summary: Retorna detalhes de um veículo específico
      description: >
        Retorna ficha completa de um veículo do estoque da Attra, incluindo
        especificações, imagens, resumo consultivo e link oficial.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetVehicleDetailsInput"
      responses:
        "200":
          description: Detalhes completos do veículo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse_GetVehicleDetails"
        "400":
          description: Erro de validação (vehicleId ausente ou inválido).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Veículo não encontrado no estoque.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno do servidor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/compare_vehicles:
    post:
      operationId: compareVehicles
      x-openai-isConsequential: false
      summary: Compara até 3 veículos com lógica consultiva
      description: >
        Compara 2 ou 3 veículos do estoque com análise de pontos fortes,
        trade-offs e recomendação baseada no objetivo do cliente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareVehiclesInput"
      responses:
        "200":
          description: Comparação consultiva com strengths, tradeoffs e recomendação.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse_CompareVehicles"
        "400":
          description: Erro de validação (vehicleIds ausentes, quantidade inválida, etc).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Um ou mais veículos não encontrados no estoque.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno do servidor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/start_consultant_handoff:
    post:
      operationId: startConsultantHandoff
      summary: Inicia contato com consultor da Attra
      description: >
        Cria handoff comercial para continuidade com consultor humano.
        Use quando houver intenção real de avanço (negociação, troca, financiamento,
        visita, proposta, decisão). Registre contexto (orçamento, uso, localização,
        troca, intenção) sem prometer condições comerciais.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartConsultantHandoffInput"
      responses:
        "200":
          description: Status do handoff criado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse_StartConsultantHandoff"
        "400":
          description: Erro de validação (campos obrigatórios ausentes ou inválidos).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno do servidor ao criar handoff.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/preview_purchase_path:
    post:
      operationId: previewPurchasePath
      x-openai-isConsequential: false
      summary: Mostra caminhos de compra possíveis
      description: >
        Apresenta os próximos passos comerciais possíveis para um veículo,
        sem fazer promessas financeiras. Orienta sobre modalidades como
        pagamento à vista, financiamento ou troca.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewPurchasePathInput"
      responses:
        "200":
          description: Próximos passos e disclaimer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse_PreviewPurchasePath"
        "400":
          description: Erro de validação (vehicleId ou purchaseMode ausentes/inválidos).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Veículo não encontrado no estoque.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno do servidor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    OAuth2PKCE:
      type: oauth2
      description: >
        OAuth 2.1 com Authorization Code + PKCE. O servidor de autorização está
        hospedado no próprio domínio da API. O campo client_id e redirect_uri são
        configurados no painel do ChatGPT Builder ao registrar a Action.
      flows:
        authorizationCode:
          authorizationUrl: https://concierge.attraveiculos.com.br/oauth/authorize
          tokenUrl: https://concierge.attraveiculos.com.br/oauth/token
          scopes:
            openid: Identificação do usuário (OIDC)
            inventory:read: Buscar e visualizar veículos do estoque
            handoff:write: Iniciar handoff comercial com consultor

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Código de erro (ex. VALIDATION_ERROR, NOT_FOUND)
            message:
              type: string
              description: Mensagem de erro legível
            details:
              type: object
              description: Detalhes adicionais do erro (opcional)
      required: [error]
      example:
        error:
          code: "VALIDATION_ERROR"
          message: "Campo 'vehicleId' é obrigatório"
          details: {}

    SearchInventoryInput:
      type: object
      properties:
        queryText:
          type: string
          description: Texto livre com a intenção de busca do usuário (ex. "SUV premium até 500 mil")
        brand:
          type: string
          description: Marca (ex. "Porsche", "BMW", "Mercedes-Benz")
        bodyType:
          type: string
          description: Tipo de carroceria (ex. "SUV", "Sedã", "Coupé")
        fuelType:
          type: string
          description: Combustível (ex. "Gasolina", "Híbrido")
        priceMin:
          type: number
          minimum: 0
          description: Preço mínimo (em BRL)
        priceMax:
          type: number
          minimum: 0
          description: Preço máximo (em BRL)
        yearMin:
          type: integer
          minimum: 1900
          description: Ano/modelo mínimo
        armored:
          type: boolean
          description: Se deve ser blindado
        usageProfile:
          type: string
          description: Perfil de uso (texto curto/constante interna)
        positioningProfile:
          type: string
          description: Perfil de posicionamento (texto curto/constante interna)

    GetVehicleDetailsInput:
      type: object
      required: [vehicleId]
      properties:
        vehicleId:
          type: string
          description: ID do veículo (ex. "ac-950539")
      example:
        vehicleId: "ac-950539"

    CompareVehiclesInput:
      type: object
      required: [vehicleIds]
      properties:
        vehicleIds:
          type: array
          items:
            type: string
          minItems: 2
          maxItems: 3
          description: IDs dos veículos para comparar (2 a 3)
        comparisonGoal:
          type: string
          description: Objetivo da comparação (ex. "qual é melhor para uso diário")
      example:
        vehicleIds: ["ac-123", "ac-456", "ac-789"]
        comparisonGoal: "qual é melhor para uso diário com família"

    StartConsultantHandoffInput:
      type: object
      description: >
        Payload estruturado para iniciar continuidade comercial com consultor humano.
        Informe 1 a 3 veículos (vehicleId ou vehicleIds) e um interestSummary objetivo.
      oneOf:
        - required: [vehicleId, interestSummary, contactChannel]
        - required: [vehicleIds, interestSummary, contactChannel]
      properties:
        vehicleId:
          type: string
          description: ID de um veículo de interesse (alternativa a vehicleIds)
        vehicleIds:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 3
          description: Lista curta (1 a 3) de IDs dos veículos de interesse
        interestSummary:
          type: string
          description: Resumo objetivo do que o cliente busca e por quê (uso + orçamento + preferências)
        preferredStore:
          type: string
          description: Unidade preferida (se o cliente mencionar)
        contactChannel:
          type: string
          enum: [whatsapp, crm, email]
          description: Canal preferido para continuidade (se informado pelo cliente)
        userName:
          type: string
          description: Nome do cliente (se informado)
        context:
          type: object
          description: Contexto estruturado para o consultor (opcional, mas recomendado)
          properties:
            budget:
              type: object
              properties:
                min:
                  type: number
                  minimum: 0
                max:
                  type: number
                  minimum: 0
                notes:
                  type: string
            usage:
              type: object
              properties:
                primaryUse:
                  type: string
                  enum: [daily, executive, family, weekend, performance, offroad, mixed, unknown]
                needsArmoring:
                  type: boolean
                passengers:
                  type: integer
                  minimum: 0
                notes:
                  type: string
            location:
              type: object
              properties:
                city:
                  type: string
                region:
                  type: string
            tradeIn:
              type: object
              properties:
                hasTradeIn:
                  type: boolean
                vehicleDescription:
                  type: string
                notes:
                  type: string
            intent:
              type: object
              properties:
                stage:
                  type: string
                  enum: [exploring, shortlist, ready]
                timeline:
                  type: string
                  enum: [immediate, 7d, 30d, 60d, 90d, unknown]
                notes:
                  type: string
            priorities:
              type: array
              items:
                type: string
              maxItems: 8
            objections:
              type: array
              items:
                type: string
              maxItems: 6
      example:
        vehicleIds: ["ac-123"]
        interestSummary: "Buscando SUV premium para uso familiar, orçamento até 500 mil, interessado em financiamento"
        contactChannel: "whatsapp"
        userName: "João Silva"
        preferredStore: "São Paulo"
        context:
          budget:
            min: 300000
            max: 500000
            notes: "Entrada de 30%, parcelas de até 2000"
          usage:
            primaryUse: "family"
            needsArmoring: true
            passengers: 5
          location:
            city: "São Paulo"
            region: "SP"
          intent:
            stage: "shortlist"
            timeline: "30d"
          priorities: ["segurança", "conforto", "espaço interno"]
          objections: ["combustível elevado"]

    PreviewPurchasePathInput:
      type: object
      required: [vehicleId, purchaseMode]
      properties:
        vehicleId:
          type: string
          description: ID do veículo
        purchaseMode:
          type: string
          enum: [cash, trade_in, financing]
          description: Modalidade de compra pretendida
        budgetContext:
          type: string
          description: Contexto de orçamento do cliente (opcional)
      example:
        vehicleId: "ac-123"
        purchaseMode: "financing"
        budgetContext: "Financiamento de 60 meses, entrada de 30%"

    VehicleRecord:
      type: object
      properties:
        id:
          type: string
        externalStockId:
          type: string
        brand:
          type: string
        model:
          type: string
        version:
          type: string
        title:
          type: string
        yearModel:
          type: integer
        price:
          type: number
        mileageKm:
          type: number
        fuelType:
          type: string
        transmission:
          type: string
        bodyType:
          type: string
        armored:
          type: boolean
        color:
          type: string
        storeUnit:
          type: string
        available:
          type: boolean
          description: Disponibilidade interna (true = em estoque)
        condition:
          type: string
          enum: [new, used]
          description: Condição do veículo (OpenAI Product Feed Spec)
        availability:
          type: string
          enum: [in_stock, out_of_stock, preorder, backorder]
          description: Status de disponibilidade padronizado (OpenAI Product Feed Spec)
        currency:
          type: string
          description: Código de moeda ISO 4217 (ex. "BRL")
          default: "BRL"
        vehicleUrl:
          type: string
          format: uri
        mainImageUrl:
          type: string
          format: uri
        imageUrls:
          type: array
          items:
            type: string
            format: uri
        usageProfile:
          type: string
        positioningProfile:
          type: string

    VehicleSearchHighlight:
      type: object
      properties:
        label:
          type: string
        value:
          type: string

    VehicleSearchResult:
      type: object
      properties:
        vehicle:
          $ref: "#/components/schemas/VehicleRecord"
        highlights:
          type: array
          items:
            $ref: "#/components/schemas/VehicleSearchHighlight"
        matchReason:
          type: string

    ToolResponse_SearchInventory:
      type: object
      properties:
        tool:
          type: string
        result:
          type: object
          properties:
            results:
              type: array
              items:
                $ref: "#/components/schemas/VehicleSearchResult"
            total:
              type: integer
            appliedFilters:
              type: object
            emptyReason:
              type: string

    ToolResponse_GetVehicleDetails:
      type: object
      properties:
        tool:
          type: string
        result:
          type: object
          properties:
            vehicle:
              $ref: "#/components/schemas/VehicleRecord"
            highlights:
              type: array
              items:
                type: string
            consultantSummary:
              type: string
            officialLink:
              type: string
              format: uri

    ToolResponse_CompareVehicles:
      type: object
      properties:
        tool:
          type: string
        result:
          type: object
          properties:
            vehicles:
              type: array
              items:
                $ref: "#/components/schemas/VehicleRecord"
            strengths:
              type: array
              items:
                type: object
                properties:
                  title:
                    type: string
                  summary:
                    type: string
            tradeoffs:
              type: array
              items:
                type: object
                properties:
                  title:
                    type: string
                  summary:
                    type: string
            recommendation:
              type: string

    ToolResponse_StartConsultantHandoff:
      type: object
      properties:
        tool:
          type: string
        result:
          type: object
          properties:
            status:
              type: string
              enum: [accepted, failed]
            destination:
              type: string
            message:
              type: string
            payload:
              type: object
              properties:
                origin:
                  type: string
                  enum: [chatgpt_app]
                createdAt:
                  type: string
                requestedVehicleIds:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 3
                vehicles:
                  type: array
                  minItems: 1
                  maxItems: 3
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      title:
                        type: string
                      brand:
                        type: string
                      model:
                        type: string
                      version:
                        type: string
                      yearModel:
                        type: integer
                      price:
                        type: number
                      mileageKm:
                        type: number
                      fuelType:
                        type: string
                      transmission:
                        type: string
                      bodyType:
                        type: string
                      armored:
                        type: boolean
                      color:
                        type: string
                      storeUnit:
                        type: string
                      available:
                        type: boolean
                      vehicleUrl:
                        type: string
                        format: uri
                      mainImageUrl:
                        type: string
                        format: uri
                contactChannel:
                  type: string
                  enum: [whatsapp, crm, email]
                preferredStore:
                  type: string
                  nullable: true
                userName:
                  type: string
                  nullable: true
                interestSummary:
                  type: string
                context:
                  type: object
                  nullable: true

    ToolResponse_PreviewPurchasePath:
      type: object
      properties:
        tool:
          type: string
        result:
          type: object
          properties:
            nextSteps:
              type: array
              items:
                type: string
            disclaimer:
              type: string

